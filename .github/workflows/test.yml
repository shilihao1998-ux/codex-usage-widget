name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # The tests exercise the plugin host and theme layer only — they never talk
      # to Codex — so no Electron binary and no login is needed.
      - run: npm install --ignore-scripts
      - run: npm test
